name: Weekly digest watchdog

# 週次サマリの安全網 (fail-safe alert)。
#
# 本体 (daily-digest.yml, 日曜 JST 01:30 発火) の週次ジョブと、その自動リトライ
# (retry-failed.yml) の両方が失敗 / スキップ / ドロップされても、ここで「今週の
# 週次ファイルが main に存在するか」を *独立した実行* でチェックし、無ければ
# GitHub Issue を立てて必ず気づけるようにする。
#
# なぜ独立ジョブか:
#   本体や retry の *中* に通知ステップを置いても、ランナーがプリエンプション
#   (runner shutdown signal / exit 143) で丸ごと死ぬと if: always() ごと消える。
#   別スケジュールで後から走る本 watchdog なら、それらが全滅していても動く。
#
# 通知に Push ではなく GitHub Issue を使う理由:
#   Web Push の購読は失効することがある (iOS 購読失効の前例あり)。Issue + assignee
#   なら GitHub 通知 (メール含む) で確実に届く。
#
# 発火: 日曜 JST 12:00 = UTC 日 03:00。本体 (公称 JST 01:30、混雑時は数時間遅延)
#       + リトライが終わるのに十分な余裕を取る。

on:
  schedule:
    - cron: "0 3 * * 0"   # 日 03:00 UTC = 日 12:00 JST
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    name: Alert if this week's weekly summary is missing
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (latest)
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          ref: main

      - name: Verify weekly file exists, open an issue if missing
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          # ISO 8601 週 (月〜日)。発火日の日曜は ISO 週の最終日なので、その週の
          # 週次ファイル名 (例: weekly-2026-W21.json) と一致する。
          ISO_WEEK=$(TZ=Asia/Tokyo date +%G-W%V)
          FILE="data/weekly-${ISO_WEEK}.json"
          echo "Checking for ${FILE} on main ..."

          if [ -f "$FILE" ]; then
            echo "OK: ${FILE} exists. No alert needed."
            exit 0
          fi

          echo "MISSING: ${FILE} was not generated by the scheduled run or its auto-retry."

          # 同じ週の open issue が既にあれば二重作成しない (毎週日曜に走るため)
          EXISTING=$(gh issue list --state open --search "${ISO_WEEK} in:title" --json number --jq 'length' 2>/dev/null || echo 0)
          if [ "${EXISTING}" != "0" ]; then
            echo "An open alert issue for ${ISO_WEEK} already exists; skipping creation."
            exit 0
          fi

          TITLE="⚠️ 週次サマリ未生成: ${ISO_WEEK}"
          BODY=$(cat <<EOF
今週 (${ISO_WEEK}) の週次サマリ「${FILE}」が main に見つかりませんでした。
本体ワークフロー (daily-digest.yml の週次ジョブ) と自動リトライ (retry-failed.yml)
の両方が失敗 / スキップされた可能性があります。

## 手動での復旧手順 (いずれか)
1. Actions タブ → 該当する日曜の「AI Daily Digest」run を開く → 「Re-run failed jobs」
2. ローカルで「/ai-daily-digest --weekly-only」を実行して push

## 補足
- 直近 7 日のデータが 3 日未満しか無い週は、仕様上 週次を意図的にスキップします
  (その場合この通知は誤報なのでクローズして OK)。
- この Issue は週次 watchdog (.github/workflows/weekly-watchdog.yml) が自動作成しました。
EOF
)
          gh issue create --title "${TITLE}" --body "${BODY}" --assignee "${OWNER}"
          echo "Created alert issue for ${ISO_WEEK}."
