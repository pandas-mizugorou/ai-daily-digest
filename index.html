<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#0b0b0f" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
  <meta name="description" content="AI / 生成 AI の押さえるべきニュースを毎朝5時に自動更新するダイジェストサイト。今日の必読 Top 5-7 + カテゴリ別 15-20 件を 10 カテゴリで配信" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AI Digest" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="./assets/styles.css" />

  <title>AI Daily Digest</title>
</head>
<body>
  <a class="skip-link" href="#main">本文へスキップ</a>

  <header class="site-header" role="banner">
    <div class="header-inner">
      <h1 class="site-title">
        <span class="site-title-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor"/></svg>
        </span>
        <span class="site-title-text site-title-full">AI Daily Digest</span>
        <span class="site-title-text site-title-short" aria-hidden="true">AI Digest</span>
      </h1>
      <div class="header-actions">
        <a id="search-link" class="icon-button" href="./search/" aria-label="記事を検索">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="20.5" y1="20.5" x2="16.5" y2="16.5"/></svg>
        </a>
        <button id="notify-button" class="icon-button hidden" type="button" aria-label="通知を有効化">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
        </button>
        <a id="weekly-link" class="icon-button hidden" href="./weekly/" aria-label="今週のサマリを見る">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4.5" width="18" height="16" rx="2"/><line x1="3" y1="9.5" x2="21" y2="9.5"/><line x1="8" y1="2.5" x2="8" y2="6"/><line x1="16" y1="2.5" x2="16" y2="6"/></svg>
        </a>
        <button id="theme-toggle" class="icon-button" type="button" aria-label="テーマ切替">
          <svg class="theme-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 3a9 9 0 0 1 0 18z" fill="currentColor"/></svg>
        </button>
        <button id="install-button" class="icon-button hidden" type="button" aria-label="ホーム画面に追加">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v12"/><path d="M7.5 10.5 12 15l4.5-4.5"/><path d="M4.5 20h15"/></svg>
        </button>
      </div>
    </div>
    <nav class="date-nav" aria-label="日付ナビゲーション">
      <button id="prev-date" class="date-nav-button" type="button" aria-label="前日">‹</button>
      <select id="date-select" class="date-select" aria-label="表示する日付を選択">
        <option value="">読み込み中…</option>
      </select>
      <button id="next-date" class="date-nav-button" type="button" aria-label="翌日">›</button>
    </nav>
  </header>

  <main id="main" class="container" tabindex="-1">
    <section id="status" class="status" aria-live="polite">
      <p class="status-message">読み込み中…</p>
    </section>

    <section id="top-picks" class="top-picks hidden" aria-label="今日の必読">
      <header class="top-picks-header">
        <h2 class="top-picks-title">
          <span class="top-picks-mark" aria-hidden="true">★</span>
          今日の必読
        </h2>
        <span class="top-picks-count"></span>
      </header>
      <div class="top-picks-items"></div>
    </section>

    <section id="summary" class="summary hidden" aria-label="本日のサマリ">
      <div class="summary-meta">
        <time id="summary-date" class="summary-date"></time>
        <span id="summary-stats" class="summary-stats"></span>
      </div>
      <h2 id="summary-headline" class="summary-headline"></h2>
      <p id="summary-text" class="summary-text"></p>
      <button id="summary-toggle" class="summary-toggle hidden" type="button" aria-expanded="false">続きを読む</button>
    </section>

    <nav id="category-tabs" class="category-tabs hidden" aria-label="カテゴリタブ"></nav>

    <section id="categories" class="categories" aria-label="カテゴリ別ニュース"></section>

    <div id="update-banner" class="update-banner hidden" role="status">
      新しい版があります
      <button id="reload-button" class="reload-button" type="button">再読込</button>
    </div>
  </main>

  <dialog id="push-dialog" class="push-dialog">
    <div class="push-dialog-inner">
      <h2 class="push-dialog-title">通知を登録</h2>
      <p class="push-dialog-desc">
        下の JSON をコピーして Claude Code に「これを subscriptions.json に登録して」と渡してください。
        登録後、日次ダイジェストの更新完了時にこの端末へ通知が届きます。
      </p>
      <textarea id="push-sub-json" class="push-sub-json" readonly rows="6" aria-label="購読 JSON"></textarea>
      <p id="push-dialog-msg" class="push-dialog-msg" role="status"></p>
      <div class="push-dialog-actions">
        <button type="button" id="push-copy-btn" class="push-btn">コピー</button>
        <button type="button" id="push-close-btn" class="push-btn push-btn-secondary">閉じる</button>
      </div>
    </div>
  </dialog>

  <footer class="site-footer" role="contentinfo">
    <p>毎朝 5:00 JST に自動更新 ・ <a href="https://github.com" id="repo-link" target="_blank" rel="noopener">GitHub</a></p>
    <p class="footer-note">今日の必読 Top 5-7 + カテゴリ別 15-20 件 を 10 カテゴリで配信（金曜は週次サマリも追加）</p>
  </footer>

  <template id="card-template">
    <article class="card" data-item-id="" data-expanded="false">
      <button class="card-toggle" type="button" aria-expanded="false">
        <div class="card-toggle-main">
          <header class="card-header">
            <h3 class="card-title"></h3>
            <p class="card-title-ja"></p>
          </header>
          <div class="card-meta">
            <span class="card-source"></span>
            <span class="card-date"></span>
            <span class="card-score" title="スコア (重要度/深度/実用性/鮮度)"></span>
          </div>
        </div>
        <span class="card-chevron" aria-hidden="true">▾</span>
      </button>
      <div class="card-body">
        <p class="card-summary clamped"></p>
        <button class="card-summary-toggle hidden" type="button" aria-expanded="false">続きを読む</button>
        <figure class="card-figure" hidden>
          <div class="figure-body" aria-hidden="true"></div>
          <figcaption class="figure-caption"></figcaption>
        </figure>
        <ul class="card-key-points"></ul>
        <div class="card-tags"></div>
        <div class="card-actions">
          <a class="card-link" target="_blank" rel="noopener">元記事を開く →</a>
          <button class="card-xdraft hidden" type="button">𝕏 投稿文をコピー</button>
          <button class="card-share icon-button" type="button" aria-label="共有">
            <span aria-hidden="true">↗</span>
          </button>
        </div>
        <button class="card-collapse-bottom" type="button" aria-label="このカードを閉じる">
          <span class="card-collapse-bottom-icon" aria-hidden="true">▴</span>
          <span class="card-collapse-bottom-text">閉じる</span>
        </button>
      </div>
    </article>
  </template>

  <template id="category-template">
    <section class="category">
      <header class="category-header">
        <h2 class="category-title"></h2>
        <span class="category-count"></span>
      </header>
      <div class="category-items"></div>
    </section>
  </template>

  <script src="./assets/app.js" type="module"></script>
</body>
</html>
