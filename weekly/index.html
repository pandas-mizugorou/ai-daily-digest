<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <meta name="theme-color" content="#0b0b0f" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
  <meta name="description" content="AI / 生成 AI の今週のサマリ。トップ 10 ニュース、論文 5 本、注目モデル、コミュニティ反響、来週の watchlist を毎週金曜に配信" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AI Weekly" />
  <meta name="mobile-web-app-capable" content="yes" />

  <link rel="manifest" href="../manifest.webmanifest" />
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="../assets/icons/apple-touch-icon.png" />
  <link rel="stylesheet" href="../assets/styles.css" />

  <title>今週のサマリ ・ AI Daily Digest</title>
</head>
<body>
  <a class="skip-link" href="#main">本文へスキップ</a>

  <header class="site-header" role="banner">
    <div class="header-inner">
      <h1 class="site-title">
        <span class="site-title-mark" aria-hidden="true">📅</span>
        AI Weekly Digest
      </h1>
      <div class="header-actions">
        <a class="icon-button" href="../" aria-label="日次ページに戻る">
          <span aria-hidden="true">←</span>
        </a>
        <button id="theme-toggle" class="icon-button" type="button" aria-label="テーマ切替">
          <span class="theme-icon" aria-hidden="true">◐</span>
        </button>
      </div>
    </div>
    <nav class="date-nav" aria-label="週ナビゲーション">
      <button id="prev-week" class="date-nav-button" type="button" aria-label="前週">‹</button>
      <select id="week-select" class="date-select" aria-label="表示する週を選択">
        <option value="">読み込み中…</option>
      </select>
      <button id="next-week" class="date-nav-button" type="button" aria-label="翌週">›</button>
    </nav>
  </header>

  <main id="main" class="container" tabindex="-1">
    <section id="status" class="status" aria-live="polite">
      <p class="status-message">読み込み中…</p>
    </section>

    <section id="weekly-summary" class="weekly-summary hidden" aria-label="今週のサマリ">
      <div class="weekly-meta">
        <span id="week-range" class="week-range"></span>
        <span id="week-stats" class="week-stats"></span>
      </div>
      <h2 id="weekly-headline" class="summary-headline"></h2>
      <p id="weekly-text" class="summary-text"></p>
    </section>

    <section id="weekly-sections" class="weekly-sections" aria-label="週次セクション"></section>

    <section id="keyword-cloud" class="keyword-cloud hidden" aria-label="今週のキーワード">
      <header class="kw-header">
        <h2 class="kw-title">今週のキーワード</h2>
      </header>
      <div class="kw-items"></div>
    </section>

    <section id="watchlist" class="watchlist hidden" aria-label="来週の watch list">
      <header class="wl-header">
        <h2 class="wl-title">来週の watch list</h2>
      </header>
      <ul class="wl-items"></ul>
    </section>

    <a class="weekly-link weekly-back-link" href="../">
      <span class="weekly-link-icon" aria-hidden="true">←</span>
      <span class="weekly-link-text">日次ページに戻る</span>
    </a>
  </main>

  <footer class="site-footer" role="contentinfo">
    <p>毎週金曜 5:00 JST に自動更新 ・ <a href="../" id="back-link">日次ページ</a></p>
    <p class="footer-note">過去 7 日のトップニュース・論文・注目モデル・コミュニティ反響・来週の watchlist</p>
  </footer>

  <template id="weekly-section-template">
    <section class="weekly-section">
      <header class="weekly-section-header">
        <h2 class="weekly-section-title"></h2>
        <span class="weekly-section-count"></span>
      </header>
      <ul class="weekly-section-items"></ul>
    </section>
  </template>

  <template id="weekly-item-template">
    <li class="weekly-item">
      <a class="weekly-item-link" target="_blank" rel="noopener">
        <span class="weekly-item-rank"></span>
        <div class="weekly-item-body">
          <span class="weekly-item-date"></span>
          <h3 class="weekly-item-title"></h3>
          <p class="weekly-item-summary"></p>
          <span class="weekly-item-source"></span>
        </div>
      </a>
    </li>
  </template>

  <script src="./app-weekly.js" type="module"></script>
</body>
</html>
